services:
  backend:
    build: ./backend
    container_name: backend
    networks:
      - my-app-network
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 20s
      timeout: 10s
      retries: 1
      start_period: 5s
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - my-app-network
    healthcheck:
      test: curl -f http://localhost/health
      interval: 20s
      timeout: 10s
      retries: 1
      start_period: 5s
    restart: unless-stopped

networks:
  my-app-network:
    driver: bridge